name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.26"
  MAGE_VERSION: "v1.17.2"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=10m

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Test
        run: mage test

  race:
    name: Race Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Race
        run: mage race

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Coverage
        run: mage coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Bench
        run: mage bench

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Cache govulncheck
        id: cache-govulncheck
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ hashFiles('go.sum') }}
      - name: Install govulncheck
        if: steps.cache-govulncheck.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        continue-on-error: true
        run: mage govulncheck
      - name: Trivy filesystem scan
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test, race, security]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Release
        run: mage release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
