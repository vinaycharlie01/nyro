setup:
  modDownload: true
  modTidy: false

test:
  packages:
    - ./...
  args:
    - "-v"
    - "-short"
    - "-timeout=120s"

integration:
  packages:
    - ./test/integration/...
  args:
    - "-v"
    - "-tags=integration"
    - "-timeout=300s"
  env:
    - REDIS_ADDR=localhost:6379
    - VALKEY_ADDR=localhost:6380

race:
  packages:
    - ./...
  args:
    - "-short"
    - "-timeout=120s"

coverage:
  packages:
    - ./...
  output: coverage.out
  args:
    - "-timeout=120s"

bench:
  packages:
    - ./...
  args:
    - "-timeout=120s"

lint:
  args:
    - "--timeout=10m"

vet:
  packages:
    - ./...

govulncheck:
  packages:
    - ./...
